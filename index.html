<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>국내 증시 · 매크로 대시보드</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<header>
  <h1>국내 증시 · 매크로 대시보드</h1>
  <p>매일 장 마감 후 자동 갱신됩니다 &middot; <span id="last-updated" class="status">불러오는 중…</span></p>
</header>

<main>
  <section class="card" id="card-kospi" data-chart-key="kospi">
    <div class="card-header">
      <h2 class="card-title">코스피</h2>
      <span class="stat-value" id="kospi-value">–</span>
      <span class="stat-delta" id="kospi-delta"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-kospi"></canvas></div>
  </section>

  <section class="card" id="card-kosdaq" data-chart-key="kosdaq">
    <div class="card-header">
      <h2 class="card-title">코스닥</h2>
      <span class="stat-value" id="kosdaq-value">–</span>
      <span class="stat-delta" id="kosdaq-delta"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-kosdaq"></canvas></div>
  </section>

  <section class="card" id="card-margin" data-chart-key="margin">
    <div class="card-header">
      <h2 class="card-title">신용거래융자 잔고</h2>
      <span class="stat-asof" id="margin-asof"></span>
      <div class="stat-item">
        <span class="stat-label"><span class="dot s1"></span>코스피</span>
        <span class="stat-value" id="margin-kospi-value">–</span>
        <span class="stat-delta" id="margin-kospi-delta"></span>
      </div>
      <div class="stat-item">
        <span class="stat-label"><span class="dot s2"></span>코스닥</span>
        <span class="stat-value" id="margin-kosdaq-value">–</span>
        <span class="stat-delta" id="margin-kosdaq-delta"></span>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart-margin"></canvas></div>
  </section>

  <section class="card" id="card-deposit" data-chart-key="deposit">
    <div class="card-header">
      <h2 class="card-title">투자자예탁금 추이</h2>
      <span class="stat-asof" id="deposit-asof"></span>
      <span class="stat-value" id="deposit-value">–</span>
      <span class="stat-delta" id="deposit-delta"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-deposit"></canvas></div>
  </section>

  <section class="card" id="card-flow" data-chart-key="flow">
    <div class="card-header">
      <h2 class="card-title">투자자별 매매동향</h2>
      <span class="card-sub">최근 1년 누적 순매수</span>
    </div>
    <div class="toggles">
      <label><input type="checkbox" data-target="flow-inst" checked><span class="dot s1"></span>기관</label>
      <label><input type="checkbox" data-target="flow-foreign" checked><span class="dot s2"></span>외국인</label>
      <label><input type="checkbox" data-target="flow-individual" checked><span class="dot s3"></span>개인</label>
    </div>
    <div class="chart-wrap"><canvas id="chart-flow"></canvas></div>
  </section>

  <section class="card" id="card-us10y" data-chart-key="us10y">
    <div class="card-header">
      <h2 class="card-title">미국 10년물 국채금리</h2>
      <span class="stat-value" id="us10y-value">–</span>
      <span class="stat-delta" id="us10y-delta"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-us10y"></canvas></div>
  </section>

  <section class="card" id="card-fx" data-chart-key="fx">
    <div class="card-header">
      <h2 class="card-title">원/달러 환율</h2>
      <span class="stat-value" id="fx-usd-value">–</span>
      <span class="stat-delta" id="fx-usd-delta"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-fx"></canvas></div>
  </section>
</main>

<footer>
  데이터 출처: KRX 정보데이터시스템, 한국은행 ECOS, 금융투자협회, FRED
</footer>

<div id="chart-modal" class="modal-backdrop">
  <div class="modal-dialog">
    <div class="modal-header">
      <h2 id="modal-title" class="card-title"></h2>
      <button id="modal-close" class="modal-close" aria-label="닫기">&times;</button>
    </div>
    <div class="modal-chart-wrap"><canvas id="modal-canvas"></canvas></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
